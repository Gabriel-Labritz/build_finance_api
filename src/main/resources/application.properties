spring.application.name=build_finance_api

# DATABASE
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true

# EMAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.email.origin=${EMAIL_USERNAME}
app.email.sender-name=Build Finance
app.url.site=http://localhost:8080

# JWT
api.security.jwt.secret=${JWT_SECRET}
api.security.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
api.security.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION}
api.security.jwt.pre-auth-token-expiration=300

# GOOGLE OAUTH
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile